<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Pending</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .pending-container {
            max-width: 600px;
            background: #111;
            padding: 40px;
            border-radius: 10px;
            border: 1px solid #333;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .pending-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--primary-color);
        }
        .pending-container h1 {
            font-size: 4rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 15px var(--primary-color-shadow);
        }
        .pending-container p {
            font-size: 18px;
            color: #ccc;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .pending-icon {
            font-size: 60px;
            color: var(--primary-color);
            margin-bottom: 20px;
            animation: spin 4s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .back-link {
            display: inline-block;
            padding: 12px 25px;
            background: var(--primary-color);
            color: black;
            border: none;
            font-weight: bold;
            border-radius: 5px;
            text-decoration: none;
            transition: 0.3s;
            cursor: pointer;
        }
        .back-link:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--primary-color);
        }
        .loading-spinner {
            font-size: 40px;
            color: var(--primary-color);
            margin-bottom: 20px;
            animation: pulse 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; filter: brightness(1); }
            50% { transform: scale(1.2); opacity: 0.7; filter: brightness(1.3); }
            100% { transform: scale(1); opacity: 1; filter: brightness(1); }
        }
    </style>
</head>
<body>
    <div class="pending-container">
        <i class="fas fa-cog pending-icon"></i>
        <h1>Pending</h1>
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
        </div>
        <p>This project is currently under development and will be available soon. Please check back later!</p>
        <a href="index.html#projects" class="back-link">Back to Projects</a>
    </div>

    <script>
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme) {
            document.documentElement.setAttribute('data-theme', currentTheme);
        }

        setTimeout(() => {
            window.close();
        }, 15000);
    </script>
</body>
</html>
